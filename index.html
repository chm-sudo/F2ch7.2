<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>論點獵手——《再談包裝》</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap');
        html, body { height: 100%; margin: 0; background-color: #fdf6ec; font-family: 'Noto Sans TC', sans-serif; }
        .game-container { display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; }
        .main-content { display: flex; flex: 1; gap: 15px; overflow: hidden; margin-top: 10px; }
        .left-panel { flex: 1.2; display: flex; flex-direction: column; position: relative; background: white; border-radius: 15px; border: 1px solid #ddd; overflow: hidden; }
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        
        /* 文字區域與動畫設定 */
        .selectable-text { padding: 20px; line-height: 2.2 !important; font-size: 1.2rem; user-select: text !important; -webkit-user-select: text !important; }
        
        /* 段落動畫核心 */
        .paragraph { 
            transition: opacity 0.8s ease, max-height 0.8s ease, margin 0.8s ease, padding 0.8s ease, filter 0.8s ease; 
            overflow: hidden; 
            max-height: 800px; 
            opacity: 1; 
            margin-bottom: 1.5rem; 
        }
        .hidden-p { 
            opacity: 0 !important; 
            max-height: 0 !important; 
            margin-bottom: 0 !important; 
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            border: none !important;
        }
        .faded { opacity: 0.3 !important; filter: grayscale(50%) !important; pointer-events: none; }
        
        /* 驗證按鈕 (維持防護) */
        #verify-btn { 
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90px; height: 90px; background: #d97706; color: white;
            border-radius: 50%; border: 4px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            z-index: 1000; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-direction: column;
            cursor: pointer; user-select: none; -webkit-user-select: none;
        }
        #verify-btn:active { background: #b45309; transform: translateX(-50%) scale(0.95); }
        
        /* UI 組件 */
        .cardboard-panel { background-color: #f5e6d3; border: 2px solid #d4b483; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; }
        .drop-slot { display: inline-flex; border: 2px solid #d97706; padding: 2px 8px; margin: 2px; border-radius: 6px; background: white; color: #b45309; font-weight: bold; cursor: pointer; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 11000; backdrop-filter: blur(4px); }
        #mc-popover { position: fixed; display: none; background: white; border: 2px solid #d97706; border-radius: 10px; z-index: 10000; flex-direction: column; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        /* 強制視覺隔離 */
        .synthesis-point {
            margin-top: 25px !important; margin-bottom: 10px !important;
            padding-top: 15px; border-top: 2px dashed #d97706;
        }
        
        /* 段落按鈕樣式 */
        .p-btn { transition: all 0.2s ease; user-select: none; -webkit-user-select: none; }
        .p-btn.selected { background-color: #d97706 !important; color: white !important; border-color: #92400e !important; }
    </style>
</head>
<body>
    <div id="mc-popover"></div>
    <div class="game-container">
        <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow border-b-4 border-amber-600">
            <h1 class="font-black text-amber-900 text-lg">論點獵手——《再談包裝》</h1>
            <div class="flex gap-4 font-bold text-sm">
                <span>錯誤：<span id="fail-counter" class="text-red-600">0</span></span>
                <span>進度：<span id="progress-val">1 / 4</span></span>
            </div>
        </div>
        <div class="main-content">
            <div class="left-panel">
                <div class="overflow-y-auto flex-1 p-2">
                    <div id="text-canvas" class="selectable-text font-serif"></div>
                    <div style="height: 120px;"></div>
                </div>
                <button id="verify-btn" onpointerdown="event.preventDefault(); handleMainVerify();"><span>✔️</span><span>驗證</span></button>
            </div>
            <div class="right-panel">
                <div class="cardboard-panel flex-1 overflow-hidden">
                    <div class="bg-white/90 p-3 rounded-lg flex-1 flex flex-col overflow-hidden">
                        
                        <!-- 錯誤提示專用框 -->
                        <div id="hint-container" class="hidden bg-white border-2 border-red-200 p-2 rounded text-red-600 mb-2 font-bold text-sm"></div>
                        
                        <div id="task-info">
                            <span id="task-stage" class="bg-amber-100 text-amber-800 px-2 py-1 rounded text-xs font-bold w-fit">任務載入中...</span>
                            <div id="task-desc" class="font-black text-stone-900 mt-2 text-base"></div>
                        </div>
                        
                        <div id="interactive-area" class="flex-1 overflow-y-auto border-t pt-2 mt-2">
                            <!-- 段落選擇區 -->
                            <div id="paragraph-select-area" class="hidden mb-4">
                                <p class="text-xs font-bold text-stone-500 mb-2">請點擊選擇目標段落 (可多選)：</p>
                                <div class="grid grid-cols-4 gap-2" id="p-btn-container"></div>
                            </div>
                            
                            <!-- 填空合成區 -->
                            <div id="cloze-area" class="hidden bg-amber-50 p-3 rounded-lg mb-2 mt-2">
                                <div id="cloze-sentence" class="font-bold text-stone-800 text-sm leading-relaxed"></div>
                            </div>
                            <!-- 合成後的論點 -->
                            <div id="target-points"></div>
                        </div>
                    </div>
                    <div id="feedback-area" class="text-center h-8 text-sm font-bold mt-1"></div>
                    <button id="main-action-btn" class="w-full py-3 mt-2 rounded-xl font-black bg-stone-300 text-stone-500" disabled>等待搜集</button>
                </div>
                <div class="bg-amber-50/50 border-2 border-dashed border-amber-200 rounded-xl p-2 flex-[0.4] overflow-y-auto text-xs">
                    <h3 class="text-center font-bold text-amber-800 mb-1">📥 證據紀錄</h3>
                    <div id="evidence-basket-content"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 填寫姓名領證書介面 -->
    <div id="name-modal" class="modal-overlay">
        <div class="bg-white p-6 rounded-2xl w-80 text-center shadow-2xl">
            <h2 class="font-black mb-4 text-xl text-amber-900">全部任務完成！</h2>
            <input type="text" id="user-class" placeholder="班別" class="w-full p-2 mb-2 border rounded font-bold">
            <input type="number" id="user-num" placeholder="班號" class="w-full p-2 mb-2 border rounded font-bold">
            <input type="text" id="user-name" placeholder="姓名" class="w-full p-2 mb-4 border rounded font-bold">
            <button id="final-submit-btn" onclick="submitAndFinish()" class="w-full py-3 bg-amber-600 text-white rounded-lg font-bold shadow-lg">生成榮譽證書</button>
        </div>
    </div>

    <!-- 終極總結證書畫面 -->
    <div id="finish-screen" class="modal-overlay">
        <div class="bg-white p-6 rounded-3xl max-w-2xl w-full mx-4 text-center border-8 border-amber-600 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-black text-amber-900 mb-4 italic">榮譽證書</h2>
            <p class="font-bold mb-4 text-lg"><span id="display-class"></span> 班 <span id="display-num"></span> 號 <span id="display-name"></span> 同學</p>
            <div id="final-summary" class="text-left bg-stone-50 p-4 rounded-xl text-sm leading-relaxed border"></div>
            <button onclick="location.reload()" class="mt-6 font-bold text-stone-400 underline hover:text-amber-600">重新挑戰</button>
        </div>
    </div>

    <script>
        const articleText = [
            "❶ 我在這裡寫的「值得擔憂」，不限於中國，而是全世界。",
            "❷ 我曾在本刊上寫過一篇《論包裝》的文章，內容主要是談外面包裝極大而裡面的商品極小的問題。現在這一篇《再論包裝》，主要談的是外面包裝和裡面商品價值的問題。重點有所不同，而令人擔憂則一也。我先舉一個小例子。",
            "❸ 最近有友人從山東歸來，帶給我一些周村燒餅，是當地生產的一種點心。作料異常簡單，不過一點麵粉、芝麻，再加上一點糖或鹽，用水和好，擀成薄皮，做成圓餅，放在爐中烤乾，即為成品，香脆可口，遠近聞名，大概有幾百年的歷史了。因為成本極低，所以價錢不高。過去只是十個或八九個一摞，用白紙一包，即可出售。燒餅吃完，把紙一揉，變成垃圾，佔地也不多。",
            "❹ 常言道：「士別三日，當刮目相看。」豈知這一句話也能應用到周村燒餅身上。現在友人送給我的這些燒餅，完全換了新裝，不是白紙，而是鐵盒，彩繪燙金，光彩奪目。夥頤！我的老朋友闊起來了！我不禁大為驚詫。",
            "❺ 在驚詫之餘，我又不禁憂心忡忡起來。我不是經濟學家，這裡也用不著經濟學。只草草地估算一下，那幾個燒餅能值幾個錢？這金碧輝煌的鐵盒值多少錢？顯然後者比前者要貴得多。可是哪一個有使用價值呢？又顯然是前者。燒餅吃下去，可以充飢，可以轉變成營養成分，增強人的身體。鐵盒，如果只有一、兩個的話，小孩可以拿著玩一玩。如果是成千上萬的話，卻只能變成垃圾，遭人遺棄。《論包裝》中提到的那一些大而無當的包裝，把其中小小的一點商品取出來後，也都成為垃圾。",
            "❻ 這有點像中國古書上的一個典故：「買櫝還珠。」但是，這個典故不過是譏笑捨本逐末，取捨不當而已，那個櫝還是有用的，決不會變成垃圾。古代人生活簡樸，沒有多少垃圾，也決不會自己製造垃圾。到了今天，人類大大地進步了。卻愈來愈蠢了，會自己製造垃圾，以致垃圾成為一個世界性問題。每一個國家的政府都為處理垃圾而大傷腦筋，至今還沒能找到一個行之有效的辦法。如此持續下去，將來人類只能在垃圾堆裏討生活了。",
            "❼ 但是，還有更嚴重的問題。人類衣、食、住、行的資料都取之於大自然。但是，小小的一個地球村裏資源畢竟是有限的。當年蘇東坡說：「惟江上之清風，與山間之明月，耳得之而為聲，目遇之而成色，取之無禁，用之不竭，是造物之無盡藏也。」東坡認為造物無盡藏，是不正確的。造物是有盡藏的，用之是有竭的。可惜到了今天，世人還多是渾渾噩噩，懵渾不懂，毫無反思悔改之意。尤其是那一個以世界警察自居的大國，在使用大自然資源方面，肆無忌憚地浪費，真不禁令人髮指。有識之士已經感覺到，人類已經是「盲人騎瞎馬，夜半臨深池」，但感覺到這種危險者不多。這是事實，並不是我一個人的杞憂。",
            "❽ 我希望有聰明智慧的中國人，懸崖勒馬，改弦更張，再也不製造那一種大而無當的商品包裝和那種金碧輝煌的商品鐵盒，給我們的子孫後代多留下一點大自然的資源。"
        ];

        const gameFlow = [
            { 
                step: 1, 
                phases: {
                    'paragraph_select': { visibleP: [0,1,2,3,4,5,6,7], fadedP: [] },
                    'evidence_collect': { visibleP: [2,3,4], fadedP: [] }
                },
                paragraphTask: { q: "1. 找出第一個論據出現的段落", a: [2, 3], hint: "周村燒餅" },
                evidences: [
                    { 
                        q: "2. 找出：周村燒餅原本的包裝方法", 
                        keywords: ["過去只是十個或八九個一摞，用白紙一包"], 
                        label: "舊有包裝",
                        fadePAfterCollect: [2]
                    },
                    { 
                        q: "3. 找出：現今周村燒餅的包裝", 
                        keywords: ["鐵盒，彩繪燙金，光彩奪目"], 
                        label: "新裝",
                        fadePAfterCollect: [3]
                    },
                    { 
                        q: "4. 找出：商品價值與包裝成本的對比", 
                        keywords: ["後者比前者要貴得多"], 
                        label: "價值倒置" 
                    }
                ],
                cloze: "分論一：現代商品{過度包裝}，其成本{遠高於}商品實際價值，造成{浪費}。",
                mcOptions: { 
                    "過度包裝": ["簡單包裝", "沒有包裝", "過度包裝"], 
                    "遠高於": ["等同於", "遠高於", "遠低於"], 
                    "浪費": ["浪費", "美觀", "節約"] 
                },
                synthesis: "分論一：現代商品過度包裝，其成本遠高於商品實際價值，造成浪費。"
            },
            {
                step: 2,
                phases: {
                    'evidence_collect': { visibleP: [0,1,2,3,4,5,6,7], fadedP: [2,3,4] }
                },
                evidences: [
                    { 
                        q: "5. 找出第二個論據", 
                        keywords: ["典故：買櫝還珠", "買櫝還珠"], 
                        label: "典故引用", 
                        hint: "這是一個引用" 
                    },
                    { 
                        q: "6. 作者引用成語買櫝還珠想帶出甚麽以包裝引申的問題？", 
                        keywords: ["垃圾"],
                        strictMatch: ["垃圾", "變成垃圾"],
                        label: "引申問題"
                    },
                    { 
                        q: "7. 找出：古代生活中出現垃圾的情況", 
                        keywords: ["沒有多少垃圾，也決不會自己製造垃圾"], 
                        label: "古代情況" 
                    },
                    { 
                        q: "8. 找出：現代生活中出現垃圾的情況", 
                        keywords: ["會自己製造垃圾，以致垃圾成為一個世界性問題"], 
                        label: "現代危機" 
                    }
                ],
                cloze: "作者以「買櫝還珠」的{成語}典故，{諷刺}現代人比古代人{愚蠢}，因為現代人會{為自己製造垃圾}。",
                mcOptions: { 
                    "成語": ["成語", "歷史", "故事"], 
                    "諷刺": ["讚揚", "批評", "諷刺"], 
                    "愚蠢": ["聰明", "愚蠢", "進步"], 
                    "為自己製造垃圾": ["追求美麗", "保護環境", "為自己製造垃圾"] 
                },
                synthesis: "分論二：今人過度包裝製造垃圾，最後演變成全球性問題。"
            },
            {
                step: 3,
                phases: {
                    'evidence_collect': { visibleP: [0,1,2,3,4,5,6,7], fadedP: [2,3,4,5] }
                },
                evidences: [
                    { q: "9. 找出第三個論據", keywords: ["惟江上之清風，與山間之明月，耳得之而為聲，目遇之而成色，取之無禁，用之不竭，是造物之無盡藏也"], label: "引用名言", hint: "引用" },
                    { q: "10. 找出文言解釋", keywords: ["東坡認為造物無盡藏"], label: "文言解釋", hint: "尋找對東坡話語的總結" },
                    { q: "11. 找出作者對此看法的評論", keywords: ["是不正確的"], label: "作者看法", hint: "作者覺得這個說法對嗎？" },
                    { 
                        q: "12. 作者引用古人名言，藉此說明什麼觀點？", 
                        keywords: ["小小的一個地球村裏資源畢竟是有限的", "造物是有盡藏的，用之是有竭的"], 
                        label: "資源觀點",
                        fadePartialPAfterCollect: { pIndex: 6, untilStr: "用之是有竭的" }
                    },
                    { q: "13. 找出第四個論據", keywords: ["盲人騎瞎馬，夜半臨深池"], label: "引用名言", hint: "引用" },
                    { q: "14. 作者引用書中的句子，藉此說明什麼觀點？", keywords: ["感覺到這種危險者不多"], label: "世人危機感", hint: "接著看" }
                ],
                cloze: "分論點：自然資源並非{不竭}，若人類繼續{浪費}，資源終會{耗盡}。",
                mcOptions: { 
                    "不竭": ["有限", "不竭", "再生"], 
                    "浪費": ["浪費", "保護", "開採"], 
                    "耗盡": ["增加", "再生", "耗盡"] 
                },
                synthesis: "分論三：指出自然資源並非「不竭」與「無盡藏」的，若人類繼續浪費，自然資源終有一天會耗盡。"
            },
            {
                step: 4,
                phases: {
                    'evidence_collect': { visibleP: [0,1,2,3,4,5,6,7], fadedP: [2,3,4,5,6] }
                },
                evidences: [
                    { 
                        q: "15. 找出：作者對中國人的具體建議", 
                        keywords: ["再也不製造那一種大而無當的商品包裝"], 
                        label: "具體建議", 
                        hint: "最後一段，改弦更張之後的行動",
                        tolerance: 15
                    },
                    { q: "16. 找出：全文開篇中，作者對於現今包裝問題的感受", keywords: ["值得擔憂"], label: "核心論點", hint: "第一段" }
                ],
                cloze: "中心論點：過度包裝問題{值得擔憂}。我們應{不再製造大而無當的包裝}。",
                mcOptions: { 
                    "值得擔憂": ["值得慶幸", "值得擔憂", "微不足道"], 
                    "不再製造大而無當的包裝": ["推廣鐵盒包裝", "加強商品包裝", "不再製造大而無當的包裝"] 
                },
                synthesis: "中心論點：商品過度包裝的問題。"
            }
        ];

        let currentIdx = 0; 
        let collectedIdx = 0; 
        let totalFail = 0;
        let currentPhase = 'paragraph_select'; 
        let selectedParagraphs = [];

        const clean = (s) => s.replace(/[\s\r\n\t\(\)\d\.,，。：「」『』!！?？❶-❽]/g, "");

        function initArticle() {
            const canvas = document.getElementById('text-canvas');
            canvas.innerHTML = articleText.map((t, i) => 
                `<div id="p-${i}" class="paragraph"><span class="text-stone-300 font-black text-[10px] mr-2 select-none bg-stone-100 px-1 rounded border">第 ${i+1} 段</span>${t}</div>`
            ).join('');

            const pBtnContainer = document.getElementById('p-btn-container');
            pBtnContainer.innerHTML = articleText.map((_, i) => 
                `<button id="p-btn-${i}" class="p-btn w-full py-2 bg-white border-2 border-stone-200 text-stone-600 rounded-lg font-bold text-sm shadow-sm" onpointerdown="event.preventDefault(); toggleParagraph(${i})">第 ${i+1} 段</button>`
            ).join('');

            updateDisplay();
        }

        function updateDisplay() {
            const flow = gameFlow[currentIdx];
            const phaseConfig = flow.phases[currentPhase];

            if (phaseConfig) {
                articleText.forEach((_, i) => {
                    const p = document.getElementById(`p-${i}`);
                    p.classList.remove('faded', 'hidden-p');
                    
                    if (phaseConfig.visibleP && !phaseConfig.visibleP.includes(i)) {
                        p.classList.add('hidden-p');
                    }
                    if (phaseConfig.fadedP && phaseConfig.fadedP.includes(i)) {
                        p.classList.add('faded');
                    }
                });
            }
            updateTaskUI();
        }

        window.toggleParagraph = function(idx) {
            const btn = document.getElementById(`p-btn-${idx}`);
            if (selectedParagraphs.includes(idx)) {
                selectedParagraphs = selectedParagraphs.filter(i => i !== idx);
                btn.classList.remove('selected');
            } else {
                selectedParagraphs.push(idx);
                btn.classList.add('selected');
            }
        };

        window.handleMainVerify = function() {
            document.getElementById('hint-container').classList.add('hidden');

            if (currentPhase === 'paragraph_select') {
                checkParagraphSelection();
            } else if (currentPhase === 'evidence_collect') {
                checkCurrentAction();
            }
        };

        function checkParagraphSelection() {
            const task = gameFlow[currentIdx].paragraphTask;
            const isCorrect = selectedParagraphs.length === task.a.length && task.a.every(v => selectedParagraphs.includes(v));
            const hintBox = document.getElementById('hint-container');

            if (isCorrect) {
                showFeedback("✓ 定位正確！", "text-green-600");
                currentPhase = 'evidence_collect';
                updateDisplay(); 
            } else {
                totalFail++; document.getElementById('fail-counter').innerText = totalFail;
                showFeedback("✗ 段落錯誤，請重新選擇", "text-red-500");
                hintBox.classList.remove('hidden');
                hintBox.innerHTML = `💡 <b>提示：</b>${task.hint}`;
            }
        }

        function checkCurrentAction() {
            const sel = window.getSelection().toString().trim();
            if (!sel || sel.length < 2) { 
                showFeedback("⚠️ 請先在原文選取文字內容", "text-red-500");
                return; 
            }
            
            const target = gameFlow[currentIdx].evidences[collectedIdx];
            const hintBox = document.getElementById('hint-container');
            const tolerance = target.tolerance !== undefined ? target.tolerance : 5;
            
            let isCorrect = false;
            let errorMsg = "✗ 不夠精準，漏了關鍵詞哦";
            const cs = clean(sel);

            if (target.strictMatch) {
                const cleanStrict = target.strictMatch.map(clean);
                if (cleanStrict.includes(cs)) {
                    isCorrect = true;
                } else if (cleanStrict.some(k => cs.includes(k))) {
                    errorMsg = "✗ 不夠精準，要收窄範圍哦";
                } else if (cleanStrict.some(k => k.includes(cs))) {
                    errorMsg = "✗ 不夠精準，漏了關鍵詞哦";
                } else {
                    errorMsg = "✗ 文字未包含答案哦，請在其他地方再找找";
                }
            } else {
                let isCompletelyOff = true;
                let isTooLong = false;
                let isTooShort = false;

                for (let k of target.keywords) {
                    const ck = clean(k);
                    if (cs.includes(ck)) {
                        isCompletelyOff = false;
                        if (cs.length - ck.length <= tolerance) {
                            isCorrect = true;
                            break;
                        } else {
                            isTooLong = true;
                        }
                    } else if (ck.includes(cs)) {
                        isCompletelyOff = false;
                        if (ck.length - cs.length <= tolerance) {
                            isCorrect = true;
                            break;
                        } else {
                            isTooShort = true;
                        }
                    }
                }

                if (!isCorrect) {
                    if (isCompletelyOff) errorMsg = "✗ 文字未包含答案哦，請在其他地方再找找";
                    else if (isTooLong) errorMsg = "✗ 不夠精準，要收窄範圍哦";
                    else if (isTooShort) errorMsg = "✗ 不夠精準，漏了關鍵詞哦";
                }
            }

            if (isCorrect) {
                if (target.fadePAfterCollect) {
                    target.fadePAfterCollect.forEach(idx => {
                        const p = document.getElementById(`p-${idx}`);
                        if (p) p.classList.add('faded');
                    });
                }

                if (target.fadePartialPAfterCollect) {
                    const config = target.fadePartialPAfterCollect;
                    const p = document.getElementById(`p-${config.pIndex}`);
                    if (p) {
                        const chars = p.querySelectorAll('.char');
                        let found = false;
                        let textSoFar = "";
                        const targetStr = clean(config.untilStr);
                        const punctuationMarks = ['，','。','：','「','」','『','』','!','！','?','？'];
                        
                        chars.forEach(c => {
                            if (found && !punctuationMarks.includes(c.innerText)) return;
                            textSoFar += c.innerText;
                            c.classList.add('faded');
                            if (clean(textSoFar).includes(targetStr)) {
                                found = true;
                            }
                        });
                    }
                }

                const d = document.createElement('div'); 
                d.className = "bg-white p-1 mb-1 border-l-2 border-amber-600 pl-2 shadow-sm rounded text-stone-700";
                d.innerHTML = `<b>【${target.label}】</b> ${sel.substring(0,20)}...`;
                document.getElementById('evidence-basket-content').prepend(d);
                
                collectedIdx++; 
                showFeedback("✓ 正確！", "text-green-600");
                window.getSelection().removeAllRanges(); 

                updateTaskUI();
            } else {
                totalFail++; document.getElementById('fail-counter').innerText = totalFail;
                showFeedback(errorMsg, "text-red-500");
                if (target.hint && !target.strictMatch) {
                    hintBox.innerHTML = `💡 <b>提示：</b>${target.hint}`;
                    hintBox.classList.remove('hidden');
                }
            }
        }

        function updateTaskUI() {
            // 清空回饋訊息
            const fbArea = document.getElementById('feedback-area');
            clearTimeout(fbArea.timeoutId);
            fbArea.innerText = '';

            const flow = gameFlow[currentIdx];
            document.getElementById('progress-val').innerText = `${currentIdx + 1} / 4`;
            const btn = document.getElementById('main-action-btn');

            if (currentPhase === 'paragraph_select') {
                document.getElementById('task-desc').innerHTML = `
                    <div class="text-xs text-amber-600 mb-1 flex items-center gap-1">
                        <span class="animate-pulse">💡</span> 請在下方選擇段落，然後點擊「驗證」
                    </div>
                    ${flow.paragraphTask.q}
                `;
                document.getElementById('paragraph-select-area').classList.remove('hidden');
                
                btn.disabled = true; 
                btn.className = "w-full py-3 mt-2 rounded-xl font-black bg-stone-300 text-stone-500 cursor-not-allowed";
                btn.innerText = "點擊段落後，點選左側 ✔️ 驗證";
            } 
            else if (currentPhase === 'evidence_collect') {
                document.getElementById('paragraph-select-area').classList.add('hidden');
                
                if (collectedIdx < flow.evidences.length) {
                    const target = flow.evidences[collectedIdx];
                    document.getElementById('task-stage').innerText = `搜集證據 (${collectedIdx}/${flow.evidences.length})`;
                    
                    document.getElementById('task-desc').innerHTML = `
                        <div class="text-xs text-amber-600 mb-1 flex items-center gap-1">
                            <span class="animate-pulse">💡</span> 請在左側選取對應原文，然後點擊「驗證」
                        </div>
                        ${target.q}
                    `;

                    btn.disabled = true; 
                    btn.className = "w-full py-3 mt-2 rounded-xl font-black bg-stone-300 text-stone-500 cursor-not-allowed";
                    btn.innerText = "等待證據";
                } else {
                    document.getElementById('task-stage').innerText = "證據齊全";
                    document.getElementById('task-desc').innerText = "點擊按鈕進行合成";
                    btn.disabled = false; 
                    btn.className = "w-full py-3 mt-2 rounded-xl font-black bg-amber-600 text-white shadow-lg cursor-pointer";
                    btn.innerText = "進入合成";
                    btn.onclick = startCloze;
                }
            }
            else if (currentPhase === 'cloze_synth') {
                document.getElementById('task-desc').innerText = "請完成邏輯推導";
            }
        }

        function startCloze() {
            currentPhase = 'cloze_synth';
            document.getElementById('cloze-area').classList.remove('hidden');
            document.getElementById('cloze-sentence').innerHTML = gameFlow[currentIdx].cloze.replace(/\{(.+?)\}/g, (m, p) => 
                `<span class="drop-slot" data-answer="${p}" onclick="showMC(this, event)">點擊選擇</span>`
            );
            const btn = document.getElementById('main-action-btn'); 
            btn.innerText = "驗證邏輯合成"; 
            btn.onclick = verifyCloze;
        }

        function showMC(slot, e) {
            e.stopPropagation(); 
            const pop = document.getElementById('mc-popover'); 
            pop.innerHTML = '';
            gameFlow[currentIdx].mcOptions[slot.dataset.answer].forEach(opt => {
                const d = document.createElement('div'); 
                d.className = "p-3 border-b cursor-pointer font-bold hover:bg-amber-100 text-sm";
                d.innerText = opt; 
                d.onclick = (ev) => { ev.stopPropagation(); slot.innerText = opt; pop.style.display = 'none'; };
                pop.appendChild(d);
            });
            const r = slot.getBoundingClientRect(); 
            pop.style.display = 'flex'; 
            pop.style.top = (r.bottom + window.scrollY + 5) + "px"; 
            pop.style.left = r.left + "px";
        }

        function verifyCloze() {
            if (Array.from(document.querySelectorAll('.drop-slot')).every(s => s.innerText === s.dataset.answer)) {
                const f = document.createElement('div'); 
                f.className = "p-2 bg-white border border-amber-600 text-amber-900 rounded font-bold text-xs synthesis-point";
                f.innerText = "📍 " + gameFlow[currentIdx].synthesis;
                document.getElementById('target-points').appendChild(f);
                
                currentIdx++; collectedIdx = 0;
                document.getElementById('cloze-area').classList.add('hidden'); 
                
                if (currentIdx < gameFlow.length) {
                    currentPhase = gameFlow[currentIdx].paragraphTask ? 'paragraph_select' : 'evidence_collect';
                    updateDisplay();
                } else {
                    showFeedback("✅ 所有任務測試完成！", "text-green-600");
                    document.getElementById('task-stage').innerText = "階段完成";
                    document.getElementById('task-desc').innerText = "請填寫資料領取證書...";
                    document.getElementById('main-action-btn').style.display = 'none';
                    document.getElementById('name-modal').style.display = 'flex';
                }

            } else { 
                totalFail++; 
                document.getElementById('fail-counter').innerText = totalFail;
                showFeedback("✗ 邏輯推理錯誤", "text-red-500"); 
            }
        }

        function submitAndFinish() {
            const uClass = document.getElementById('user-class').value.trim();
            const uNum = document.getElementById('user-num').value.trim();
            const uName = document.getElementById('user-name').value.trim();
            
            if (!uClass || !uNum || !uName) { 
                alert("請完整填寫班別、班號與姓名！"); 
                return; 
            }
            
            // --- 背景傳送數據到 Google Apps Script (使用 GET 方法對應您的 doGet) ---
            const scriptURL = "https://script.google.com/macros/s/AKfycbwCZc8JvRxTjx6O7jKrIn6IssYxmxMT1EYYCl6DClMtqezbwxhu4IeUMWahuhxWzE2w2A/exec";
            const datetimeStr = new Date().toLocaleString('zh-TW');
            
            const queryParams = new URLSearchParams({
                class: uClass,
                name: uName,
                fails: totalFail,
                time: datetimeStr
            }).toString();

            const finalUrl = scriptURL + (scriptURL.includes('?') ? '&' : '?') + queryParams;

            fetch(finalUrl, {
                method: 'GET',
                mode: 'no-cors'
            }).catch(error => console.error('Data upload failed:', error));
            // ----------------------------------------
            
            document.getElementById('display-class').innerText = uClass;
            document.getElementById('display-num').innerText = uNum;
            document.getElementById('display-name').innerText = uName;
            
            document.getElementById('name-modal').style.display = 'none';
            document.getElementById('finish-screen').style.display = 'flex';
            
            document.getElementById('final-summary').innerHTML = `
                <p class="font-black text-center text-amber-800 border-b pb-2 mb-3 text-lg">📝 《再論包裝》結構總結</p>
                <div class="mb-3"><b>● 中心論點：</b>商品過度包裝的問題</div>
                <div class="mb-3"><b>● 分論一：</b>現代商品過度包裝，商品的包裝成本遠高於商品實際價值，造成浪費。<br><span class="pl-4 text-stone-600 text-xs italic block mt-1">論據：舉出現今周村燒餅以彩繪燙金的鐵盒包裝作例子、商品（燒餅）本身的價值不高，但包裝（鐵盒）的成本卻比商品價值高昂得多。</span></div>
                <div class="mb-3"><b>● 分論二：</b>今人過度包裝製造垃圾，最後演變成全球性問題。<br><span class="pl-4 text-stone-600 text-xs italic block mt-1">作者以“買櫝還珠”的成語典故，諷刺現代人比古代人愚蠢，因爲現代人會爲自己製造垃圾<br>論據：古代人生活簡樸，沒有多少垃圾；現代人製造過多垃圾，每一個國家都為處理垃圾大傷腦筋。</span></div>
                <div class="mb-3"><b>● 分論三：</b>指出自然資源並非「不竭」與「無盡藏」的，若人類繼續浪費，自然資源終有一天會耗盡。<br><span class="pl-4 text-stone-600 text-xs italic block mt-1">論據：作者以蘇東坡的名言，表示古人認爲資源是用之不竭的，以突出造物是有盡藏的，用之有竭的<br>作者引用世説新語，諷刺把部分人未能感覺地球資源正逐漸消耗的危機</span></div>
                <p class="font-black text-amber-700 mt-4 text-center text-base">結論：聰明的中國人應該懸崖勒馬、改弦更張，給子孫多留一點資源。</p>
            `;
        }

        // 修改：使用 setTimeout 設定計時，讓提示訊息自動消失
        function showFeedback(m, c) { 
            const el = document.getElementById('feedback-area'); 
            el.innerText = m; 
            el.className = "text-center h-8 text-sm font-bold mt-1 " + c; 
            clearTimeout(el.timeoutId);
            if (m !== "") {
                el.timeoutId = setTimeout(() => { el.innerText = ""; }, 3000); 
            }
        }

        window.onclick = () => document.getElementById('mc-popover').style.display = 'none';
        window.onload = () => { initArticle(); };
    </script>
</body>
